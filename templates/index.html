<!DOCTYPE html>
<html>
<head>
    <title>Applied Jobs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#0a0a0c; --panel:rgba(22,22,26,0.74); --panel-solid:#161619;
            --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.14);
            --fg:#E6E6E8; --dim:#94A1B2; --accent:#7F5AF0; --accent2:#00E8C6;
            --ok:#2ECC71; --warn:#F1C40F; --danger:#E74C3C; --radius:14px;
        }
        *{box-sizing:border-box}
        body{
            font-family:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
            margin:0; color:var(--fg);
            background:
                radial-gradient(1000px 600px at 0% -10%, rgba(127,90,240,.18), transparent 55%),
                radial-gradient(900px 500px at 100% 0%, rgba(0,232,198,.12), transparent 55%),
                var(--bg);
            min-height:100vh; -webkit-font-smoothing:antialiased;
        }
        a{ color:var(--accent2); text-decoration:none; }
        a:hover{ text-decoration:underline; }

        /* ---- App shell: sidebar + main ---- */
        .container{ display:grid; grid-template-columns:260px 1fr; min-height:100vh; max-width:none; margin:0; }
        .sidebar{
            background:rgba(14,14,17,.7); backdrop-filter:blur(22px);
            border-right:1px solid var(--border); padding:22px 18px;
            display:flex; flex-direction:column; gap:6px;
            position:sticky; top:0; height:100vh;
        }
        .sb-brand{ display:flex; align-items:center; gap:11px; margin-bottom:20px; }
        .sb-logo{
            width:38px; height:38px; border-radius:11px;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            display:grid; place-items:center; font-weight:800; font-size:18px; color:#0a0a0c;
            box-shadow:0 6px 22px rgba(127,90,240,.45);
        }
        .sb-brand h1{ font-size:16px; font-weight:700; margin:0; }
        .sb-brand .sb-sub{ font-size:11px; color:var(--dim); }
        .sb-nav{ display:flex; flex-direction:column; gap:3px; }
        .sb-link{
            display:flex; align-items:center; gap:11px; padding:11px 13px;
            border-radius:10px; color:var(--dim); font-size:13px; font-weight:600;
            cursor:pointer; transition:.15s; border:1px solid transparent;
        }
        .sb-link:hover{ background:rgba(255,255,255,.04); color:var(--fg); text-decoration:none; }
        .sb-link.active{
            background:linear-gradient(135deg,rgba(127,90,240,.22),rgba(0,232,198,.10));
            color:var(--fg); border:1px solid var(--border-strong);
        }
        .sb-link .ic{ width:18px; text-align:center; }
        .sb-foot{ margin-top:auto; padding-top:16px; border-top:1px solid var(--border); }
        .sb-run{ display:flex; align-items:center; gap:9px; font-size:12px; color:var(--dim); }
        .sb-dot{ width:9px; height:9px; border-radius:50%; background:var(--ok); box-shadow:0 0 10px var(--ok); }

        .main{ padding:28px 32px; overflow-y:auto; }

        /* ---- Top bar ---- */
        .top-bar{
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:22px;
        }
        .top-bar h1{ font-size:20px; font-weight:700; margin:0; }

        /* ---- Stat strip ---- */
        .stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:13px; margin-bottom:22px; }
        .stat{ background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:15px 17px; backdrop-filter:blur(14px); }
        .stat .n{ font-size:24px; font-weight:700; }
        .stat .l{ font-size:11px; color:var(--dim); margin-top:2px; }
        .stat .n.teal{ color:var(--accent2); }
        .stat .n.purple{ color:var(--accent); }

        /* ---- Jobs table card ---- */
        .table-card{ background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); backdrop-filter:blur(14px); overflow:hidden; }
        .table-card-head{ display:flex; align-items:center; justify-content:space-between; padding:15px 18px; border-bottom:1px solid var(--border); }
        .table-card-head h2{ font-size:13px; font-weight:600; letter-spacing:.3px; margin:0; }
        table{ border-collapse:collapse; width:100%; }
        th, td{ padding:12px 18px; text-align:left; font-size:13px; }
        th{ font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--dim); font-weight:600; border-bottom:1px solid var(--border); }
        td{ border-bottom:1px solid rgba(255,255,255,.04); }
        tbody tr:last-child td{ border-bottom:none; }
        tbody tr:hover{ background:rgba(127,90,240,.07); }
        .sl-column{ width:50px; text-align:center; }
        .sort-button{ background:none; border:none; cursor:pointer; padding:0 5px; font-size:12px; color:var(--dim); }
        .sort-button:hover{ color:var(--accent2); }
        .applied-column{ width:70px; text-align:center; }
        .tick{ color:var(--ok); font-weight:700; }

        /* ---- Overlay ---- */


        @media(max-width:820px){
            .container{ grid-template-columns:1fr; }
            .sidebar{ position:static; height:auto; flex-direction:row; align-items:center; flex-wrap:wrap; }
            .sb-nav{ flex-direction:row; flex-wrap:wrap; }
            .sb-foot{ margin:0; border:none; padding:0; }
        }
        @media(max-width:600px){
            .stats{ grid-template-columns:1fr 1fr; }
            .form-grid{ grid-template-columns:1fr; }
            .form-grid.cols-3{ grid-template-columns:1fr; }
            .form-group.span-2{ grid-column:span 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sb-brand">
                <div class="sb-logo">C</div>
                <div><h1>CVSniper</h1><div class="sb-sub">v1.0.0</div></div>
            </div>
            <nav class="sb-nav">
                <a class="sb-link active"><span class="ic">▦</span> Dashboard</a>
            </nav>
            <div class="sb-foot"><div class="sb-run"><span class="sb-dot"></span> Bot conectado</div></div>
        </aside>

        <!-- Main -->
        <main class="main">
            <div class="top-bar">
                <h1>Dashboard</h1>
                <span style="color:var(--dim);font-size:12px">El bot se configura desde su ventana ⚙ Settings</span>
            </div>

            <div class="stats">
                <div class="stat"><div class="n" id="stat-total">0</div><div class="l">Postulaciones</div></div>
                <div class="stat"><div class="n teal" id="stat-week">0</div><div class="l">Esta semana</div></div>
                <div class="stat"><div class="n purple" id="stat-easy">0</div><div class="l">Easy Apply</div></div>
                <div class="stat"><div class="n" id="stat-external">0</div><div class="l">Enlaces externos</div></div>
            </div>

            <div class="table-card">
                <div class="table-card-head"><h2>Historial de postulaciones</h2></div>
                <table id="jobsTable">
                    <thead>
                        <tr>
                            <th class="sl-column">#</th>
                            <th>Job Title</th>
                            <th>Company</th>
                            <th>HR Contact</th>
                            <th>
                                External Link
                                <button class="sort-button" onclick="sortByExternalLink()">↕️</button>
                            </th>
                            <th class="applied-column">Applied</th>
                        </tr>
                    </thead>
                    <tbody id="jobsBody"></tbody>
                </table>
            </div>
        </main>
    </div>


    <script>
        // ===== JOBS TABLE (original logic) =====
        let sortOrder = 'asc';
        let jobsData = [];

        function createTableRow(job, index) {
            const row = document.createElement('tr');
            const slCell = document.createElement('td');
            slCell.textContent = index + 1;
            slCell.className = 'sl-column';
            row.appendChild(slCell);

            const titleCell = document.createElement('td');
            const titleLink = document.createElement('a');
            titleLink.href = job.Job_Link;
            titleLink.textContent = job.Title;
            titleLink.target = '_blank';
            titleCell.appendChild(titleLink);
            row.appendChild(titleCell);

            const companyCell = document.createElement('td');
            companyCell.textContent = job.Company;
            row.appendChild(companyCell);

            const hrCell = document.createElement('td');
            if (job.HR_Name && job.HR_Name !== 'Unknown') {
                const hrLink = document.createElement('a');
                hrLink.href = job.HR_Link;
                hrLink.textContent = job.HR_Name;
                hrLink.target = '_blank';
                hrCell.appendChild(hrLink);
            } else {
                hrCell.textContent = 'N/A';
            }
            row.appendChild(hrCell);

            const extCell = document.createElement('td');
            const appliedCell = document.createElement('td');
            appliedCell.className = 'applied-column';

            if (job.External_Job_link === 'Easy Applied') {
                extCell.textContent = 'Easy Applied';
                appliedCell.innerHTML = '<span class="tick">✓</span>';
            } else if (job.External_Job_link) {
                const extLink = document.createElement('a');
                extLink.href = job.External_Job_link;
                extLink.textContent = 'External Link';
                extLink.target = '_blank';
                extLink.addEventListener('click', async () => {
                    try {
                        const response = await fetch(`/applied-jobs/${job.Job_ID}`, { method: 'PUT', headers: {'Content-Type':'application/json'} });
                        if (response.ok) { appliedCell.innerHTML = '<span class="tick">✓</span>'; job.Date_Applied = new Date().toISOString(); }
                    } catch (error) { console.error('Error updating applied date:', error); }
                });
                extCell.appendChild(extLink);
                if (job.Date_Applied !== 'Pending') appliedCell.innerHTML = '<span class="tick">✓</span>';
            } else {
                extCell.textContent = 'N/A';
            }
            row.appendChild(extCell);
            row.appendChild(appliedCell);
            return row;
        }

        function sortByExternalLink() {
            sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
            jobsData.sort((a, b) => {
                const va = a.External_Job_link || '', vb = b.External_Job_link || '';
                return sortOrder === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
            });
            const tbody = document.getElementById('jobsBody');
            tbody.innerHTML = '';
            jobsData.forEach((job, index) => tbody.appendChild(createTableRow(job, index)));
        }

        fetch('/applied-jobs')
            .then(r => r.json())
            .then(jobs => {
                jobsData = jobs;
                const tbody = document.getElementById('jobsBody');
                jobs.forEach((job, index) => tbody.appendChild(createTableRow(job, index)));
                updateStats(jobs);
            })
            .catch(error => console.error('Error:', error));

        function updateStats(jobs) {
            try {
                const total = jobs.length;
                const easy = jobs.filter(j => j.External_Job_link === 'Easy Applied').length;
                const external = jobs.filter(j => j.External_Job_link && j.External_Job_link !== 'Easy Applied').length;
                const now = new Date();
                const weekAgo = new Date(now.getTime() - 7*24*60*60*1000);
                const week = jobs.filter(j => {
                    const d = new Date(j.Date_Applied);
                    return !isNaN(d) && d >= weekAgo;
                }).length;
                const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
                set('stat-total', total); set('stat-week', week); set('stat-easy', easy); set('stat-external', external);
            } catch(e) { console.error('stats error', e); }
        }

    </script>
</body>
</html>
